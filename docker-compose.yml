services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanban_net

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:-kanban_secret}@postgres:5432/${POSTGRES_DB:-kanban}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change_this_secret_in_production_32chars}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOAD_DIR: /uploads
      NODE_ENV: production
      # Admin seed
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@kanban.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      # Gmail SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Kanban Board <noreply@example.com>}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # MCP OAuth2 bearer token validation (optional)
      MCP_OAUTH_ISSUER: ${MCP_OAUTH_ISSUER:-}
      MCP_OAUTH_JWKS_URL: ${MCP_OAUTH_JWKS_URL:-}
      MCP_OAUTH_AUDIENCE: ${MCP_OAUTH_AUDIENCE:-}
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kanban_net

volumes:
  postgres_data:
  uploads:

networks:
  kanban_net:
    driver: bridge
